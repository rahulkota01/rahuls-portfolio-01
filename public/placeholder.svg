<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.15" />
    </linearGradient>
    <radialGradient id="pulseGradient">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGradient)" />
  
  <!-- Accent rings -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#pulseGradient)" stroke-width="1" opacity="0.3" />
  <circle cx="200" cy="200" r="170" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.2" />
  
  <!-- Icon placeholder - person silhouette -->
  <g fill="#3b82f6" opacity="0.6">
    <circle cx="200" cy="120" r="35" />
    <path d="M 160 180 Q 160 160 200 160 Q 240 160 240 180 L 240 250 Q 240 280 200 280 Q 160 280 160 250 Z" />
  </g>
  
  <!-- Text -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="500" text-anchor="middle" fill="#3b82f6" opacity="0.7">
    Add Your Photo
  </text>
  
  <!-- Animated pulse effect (CSS will override this) -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.2">
    <animate attributeName="r" values="180;200;180" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
